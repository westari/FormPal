name: iOS Dev Build

on:
  workflow_dispatch:

jobs:
  build:
    name: EAS local build — iOS development
    # macos-26 provides Xcode 26, required for iOS 26 liquid glass rendering.
    runs-on: macos-26
    timeout-minutes: 90
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List available Xcode installations
        run: ls /Applications/ | grep -i xcode || true

      - name: Select newest Xcode 26.x available
        # Probe from newest to oldest so we land on the version whose iOS platform
        # is most likely already installed on this runner image.
        run: |
          XCODE_26=""
          for path in /Applications/Xcode_26.5.app \
                      /Applications/Xcode_26.4.app \
                      /Applications/Xcode_26.3.app \
                      /Applications/Xcode_26.2.app \
                      /Applications/Xcode_26.1.app \
                      /Applications/Xcode_26.0.app \
                      /Applications/Xcode_26.app; do
            if [ -d "$path" ]; then XCODE_26="$path"; break; fi
          done
          if [ -n "$XCODE_26" ]; then
            sudo xcode-select -s "$XCODE_26/Contents/Developer"
            echo "Selected: $XCODE_26"
          else
            echo "WARNING: no Xcode_26*.app found — using runner default"
          fi

      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Ensure iOS device platform is installed
        # Downloads the iOS device platform SDK for the selected Xcode version.
        # Required for xcodebuild to archive for generic/platform=iOS (real device).
        # If the platform is already present this is a fast no-op (~30s).
        # If missing this downloads ~8 GB — allowed by the 90-min timeout.
        run: sudo xcodebuild -downloadPlatform iOS

      - name: Confirm simulator runtimes available
        run: xcrun simctl list runtimes

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build iOS dev client (local)
        env:
          EAS_SKIP_AUTO_FINGERPRINT: "1"
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: eas build --platform ios --profile development --local --non-interactive --output ./build.ipa

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: formpal-dev-build
          path: ./build.ipa
          retention-days: 7

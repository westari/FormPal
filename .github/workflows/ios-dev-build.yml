name: iOS Dev Build

on:
  workflow_dispatch:

jobs:
  build:
    name: EAS local build — iOS development
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build iOS dev client (local)
        run: eas build --platform ios --profile development --local --non-interactive --output ./build.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: formpal-dev-build
          path: ./build.ipa
          retention-days: 7
